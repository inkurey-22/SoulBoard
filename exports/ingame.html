<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soulboard</title>
    <style>
        @font-face {
            font-family: "Anek Gujarati Condensed";
            src: local("Anek Gujarati Condensed SemiBold"),
                local("Anek Gujarati Condensed");
            font-style: normal;
            font-weight: 600;
        }

        html,
        body {
            width: 1920px;
            height: 1080px;
            margin: 0;
            overflow: hidden;
        }

        body {
            font-family: "Anek Gujarati Condensed", system-ui, sans-serif;
            font-weight: 600;
            color: white;
            background-image: url(../assets/game_bg.png);
        }

        .app {
            text-align: left;
            padding: 16px;
            position: relative;
        }

        .description {
            position: absolute;
            left: 28px;
            top: 25px;
            width: 430px;
            height: 30px;
            margin: 0;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(8px, 8vh, 30px);
        }

        .adaptive-text {
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1;
        }

        .team-a-name-box {
            position: absolute;
            left: 40px;
            top: 80px;
            width: 320px;
            height: 70px;
            font-size: clamp(10px, 10vh, 70px);
            justify-content: flex-start;
        }

        .team-a-score-box {
            position: absolute;
            left: 380px;
            top: 80px;
            width: 70px;
            height: 70px;
            font-size: clamp(8px, 8vh, 70px);
        }

        .team-b-name-box {
            position: absolute;
            left: 40px;
            top: 180px;
            width: 320px;
            height: 70px;
            font-size: clamp(10px, 10vh, 70px);
            justify-content: flex-start;
        }

        .team-b-score-box {
            position: absolute;
            left: 380px;
            top: 180px;
            width: 70px;
            height: 70px;
            font-size: clamp(8px, 8vh, 70px);
        }
    </style>
</head>

<body>
    <main class="app">
        <div class="description adaptive-text" id="description"></div>
        <div class="team-a-name-box adaptive-text" id="team-a-name">Team A</div>
        <div class="team-a-score-box adaptive-text" id="team-a-score">0</div>
        <div class="team-b-name-box adaptive-text" id="team-b-name">Team B</div>
        <div class="team-b-score-box adaptive-text" id="team-b-score">0</div>
    </main>

    <script>
        const descriptionEl = document.getElementById("description");
        const teamANameEl = document.getElementById("team-a-name");
        const teamBNameEl = document.getElementById("team-b-name");
        const teamAScoreEl = document.getElementById("team-a-score");
        const teamBScoreEl = document.getElementById("team-b-score");

        function connect() {
            const ws = new WebSocket("ws://127.0.0.1:7878/ws");

            ws.onmessage = (event) => {
                try {
                    const payload = JSON.parse(event.data);
                    descriptionEl.textContent = String(payload.description ?? "");
                    teamANameEl.textContent = String(payload.team_a_name ?? "Team A");
                    teamBNameEl.textContent = String(payload.team_b_name ?? "Team B");
                    teamAScoreEl.textContent = String(payload.team_a ?? 0);
                    teamBScoreEl.textContent = String(payload.team_b ?? 0);
                } catch (_error) {
                    // Ignore parse errors
                }
            };

            ws.onclose = () => {
                setTimeout(connect, 1000);
            };

            ws.onerror = () => {
                ws.close();
            };
        }

        connect();
    </script>
</body>

</html>
