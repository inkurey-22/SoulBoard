name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Linux
        run: cargo build --release --target=x86_64-unknown-linux-gnu
      
      - name: Build Windows
        run: cargo build --release --target=x86_64-pc-windows-gnu
